<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - Smart Buy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-gray-800">
    <aside id="sidebar" class="fixed md:relative z-50 hidden md:flex w-64 h-full bg-white border-r border-gray-200 flex-col shrink-0">
        <div class="h-20 flex items-center px-8 border-b border-gray-100">
            <i class="fa-solid fa-car-side text-blue-700 text-2xl mr-3"></i>
            <span class="font-bold text-xl tracking-tight">Smart Buy</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="inicio_asesor.html" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 rounded-lg font-medium transition"><i class="fa-solid fa-house w-5"></i> Inicio</a>
            <a href="solicitudes.html" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-lg font-medium"><i class="fa-solid fa-file-signature w-5"></i> Solicitudes</a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 rounded-lg font-medium transition"><i class="fa-solid fa-users w-5"></i> Clientes</a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 rounded-lg font-medium transition"><i class="fa-solid fa-chart-pie w-5"></i> Resultados</a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <button id="btnLogout" class="flex items-center gap-3 px-4 py-3 w-full text-red-500 hover:bg-red-50 rounded-lg font-medium transition"><i class="fa-solid fa-arrow-right-from-bracket w-5"></i> Cerrar Sesión</button>
        </div>
    </aside>
    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-10 shrink-0">
            <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="md:hidden text-2xl">
            <i class="fa-solid fa-bars"></i>
            </button>
            <h1 class="text-xl font-bold text-gray-800">Gestión de Solicitudes</h1>
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold"><i class="fa-solid fa-user-tie"></i></div>
                <div class="flex flex-col"><span class="text-sm font-bold" id="userNameDisplay">Asesor</span></div>
            </div>
        </header>
        <div class="p-10 mx-auto w-full max-w-7xl">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden p-6">
                <div class="flex justify-end mb-4"><a href="asesor.html" class="bg-blue-700 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-800"><i class="fa-solid fa-plus mr-2"></i>Nueva Solicitud</a></div>
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 border-b border-gray-200 text-gray-600 font-semibold">
                        <tr><th>ID</th><th>Cliente</th><th>Vehículo</th><th>Monto a Financiar</th><th>Estado</th><th>Acciones</th></tr>
                    </thead>
                    <tbody id="tablaSolicitudes" class="divide-y divide-gray-100 text-gray-700"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="./js/tablas.js"></script>
</body>
</html>
