<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Simulaciones - Smart Buy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-gray-800">

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity md:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 flex flex-col transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 shrink-0">
        <div class="h-20 flex items-center px-8 border-b border-gray-100">
            <i class="fa-solid fa-car-side text-blue-700 text-2xl mr-3"></i>
            <span class="font-bold text-xl tracking-tight">Smart Buy</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="inicio_cliente.html" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 rounded-lg font-medium transition"><i class="fa-solid fa-house w-5"></i> Inicio</a>
            <a href="simulador.html" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 rounded-lg font-medium transition"><i class="fa-solid fa-calculator w-5"></i> Nueva Simulación</a>
            <a href="mis_simulaciones.html" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-lg font-medium"><i class="fa-solid fa-folder-open w-5"></i> Mis Simulaciones</a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <button id="btnLogout" class="flex items-center gap-3 px-4 py-3 w-full text-red-500 hover:bg-red-50 rounded-lg font-medium transition"><i class="fa-solid fa-arrow-right-from-bracket w-5"></i> Cerrar Sesión</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto relative">
        <header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-10 shrink-0">
            <button onclick="toggleMenu()" class="md:hidden text-2xl text-gray-600 focus:outline-none">
                <i class="fa-solid fa-bars"></i>
            </button>
            <h1 class="text-xl font-bold text-gray-800 hidden sm:block">Mis Simulaciones</h1>
            <div class="flex items-center gap-4 ml-auto sm:ml-0">
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold"><i class="fa-solid fa-user"></i></div>
                <div class="flex flex-col"><span class="text-sm font-bold" id="userNameDisplay">Cliente</span></div>
            </div>
        </header>

        <div class="p-4 md:p-10 mx-auto w-full max-w-7xl">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 md:p-6">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap min-w-[700px]">
                        <thead class="bg-gray-50 border-b border-gray-200 text-gray-600 font-semibold">
                            <tr>
                                <th class="px-4 py-3">ID</th>
                                <th class="px-4 py-3">Vehículo</th>
                                <th class="px-4 py-3">Monto a Financiar</th>
                                <th class="px-4 py-3">Plazo</th>
                                <th class="px-4 py-3">Estado</th>
                                <th class="px-4 py-3">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaMisSimulaciones" class="divide-y divide-gray-100 text-gray-700"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="./js/config.js"></script>
    <script src="./js/tablas.js"></script>
    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }
        document.getElementById('sidebarOverlay').addEventListener('click', toggleMenu);
    </script>
</body>
</html>
