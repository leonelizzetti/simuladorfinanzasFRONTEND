<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - Smart Buy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-gray-800">

    <aside id="sidebar" class="fixed md:relative z-50 hidden md:flex w-64 h-full bg-white border-r border-gray-200 flex-col shrink-0">
        <div class="h-20 flex items-center px-8 border-b border-gray-100">
            <i class="fa-solid fa-car-side text-blue-700 text-2xl mr-3"></i>
            <span class="font-bold text-xl tracking-tight">Smart Buy</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="inicio_cliente.html" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 rounded-lg font-medium transition">
                <i class="fa-solid fa-house w-5"></i> Inicio
            </a>
            <a href="simulador.html" class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 rounded-lg font-medium transition">
                <i class="fa-solid fa-file-invoice-dollar w-5"></i> Nueva Simulación
            </a>
            <a href="mis_simulaciones.html" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-lg font-medium">
                <i class="fa-solid fa-list w-5"></i> Mis Simulaciones
            </a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <button id="btnLogout" class="flex items-center gap-3 px-4 py-3 w-full text-red-500 hover:bg-red-50 rounded-lg font-medium transition">
                <i class="fa-solid fa-arrow-right-from-bracket w-5"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-10 shrink-0">
            <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="md:hidden text-2xl">
            <i class="fa-solid fa-bars"></i>
            </button>
            <h1 class="text-xl font-bold text-gray-800">Resultados y Cronograma</h1>
            <div class="flex items-center gap-4">
                <div class="flex flex-col text-right">
                    <span class="text-sm font-bold text-gray-800" id="userNameDisplay">Cargando...</span>
                    <span class="text-xs text-gray-500">Cliente</span>
                </div>
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </header>

        <div class="p-10 mx-auto w-full max-w-7xl">
            <div class="grid grid-cols-4 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-blue-700">
                    <h3 class="text-sm text-gray-500 font-semibold mb-1">Monto a Financiar</h3>
                    <p class="text-2xl font-bold text-gray-800" id="valMonto">---</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-purple-600">
                    <h3 class="text-sm text-gray-500 font-semibold mb-1">TCEA</h3>
                    <p class="text-2xl font-bold text-purple-700" id="valTcea">---</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-green-500">
                    <h3 class="text-sm text-gray-500 font-semibold mb-1">VAN</h3>
                    <p class="text-2xl font-bold text-gray-800" id="valVan">---</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-orange-500">
                    <h3 class="text-sm text-gray-500 font-semibold mb-1">TIR</h3>
                    <p class="text-2xl font-bold text-orange-600" id="valTir">---</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-8">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-gray-50 border-b border-gray-200 text-gray-600 font-semibold">
                            <tr>
                                <th class="px-6 py-4">N°</th>
                                <th class="px-6 py-4">Saldo Inicial</th>
                                <th class="px-6 py-4">Amortización</th>
                                <th class="px-6 py-4">Interés</th>
                                <th class="px-6 py-4">S. Desgravamen</th>
                                <th class="px-6 py-4">S. Vehicular</th>
                                <th class="px-6 py-4">Cuota</th>
                                <th class="px-6 py-4">Flujo</th>
                                <th class="px-6 py-4">Saldo Final</th>
                            </tr>
                        </thead>
                        <tbody id="cronogramaBody" class="divide-y divide-gray-100 text-gray-700"></tbody>
                    </table>
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-4">
                <a href="mis_simulaciones.html" class="px-6 py-3 border border-gray-300 rounded-lg text-gray-700 font-bold hover:bg-gray-50 transition">
                    Regresar a Mis Simulaciones
                </a>
            </div>
        </div>
    </main>

    <script src="./js/config.js"></script>
    <script src="./js/resultados.js"></script>
</body>
</html>
